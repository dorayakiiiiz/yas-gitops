# 1. DENY ALL mac dinh - chan het traffic neu khong co rule nao khop
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: dev
spec: {}
---
# 2. Cho phep moi traffic vao storefront-ui
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-storefront-ui
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-ui
  action: ALLOW
  rules:
    - {}
---
# 3. Cho phep moi traffic vao storefront-bff (tu Nginx Ingress va browser)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-storefront-bff
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-bff
  action: ALLOW
  rules:
    - {}
---
