# 7. Cho phep sampledata truy cap khong han che (can load du lieu mau)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-sampledata
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sampledata
  action: ALLOW
  rules:
    - {}
---
# 8. Cho phep BFF va sampledata goi den product service
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-product
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/backoffice-bff"
              - "cluster.local/ns/dev/sa/sampledata"
---
