backend:
  podAnnotations:
    proxy.istio.io/config: '{"proxyMetadata":{"ISTIO_META_DNS_CAPTURE":"false","ISTIO_META_DNS_AUTO_ALLOCATE":"false"}}'
  image:
    repository: dorayakiiiiz/yas-backoffice-bff
    tag: latest

  nameOverride: backoffice-bff
  fullnameOverride: backoffice-bff
  deployment:
    annotations:
      configmap.reloader.stakater.com/reload: "yas-gateway-routes-config-configmap,backoffice-bff-extra-configmap"
  ingress:
    enabled: true
    host: backoffice.dev.local.com
    path: /
  extraEnvs:
    - name: SPRING_PROFILES_ACTIVE
      value: prod
    - name: UI_HOST
      value: http://backoffice-ui.dev.svc.cluster.local:3000
    - name: JAVA_TOOL_OPTIONS
      value: "-Djava.net.preferIPv4Stack=true"
  extraEnvFroms:
    - secretRef:
        name: yas-keycloak-credentials-secret
    - secretRef:
        name: yas-redis-credentials-secret
  extraVolumes:
    - name: yas-gateway-routes-config
      configMap:
        name: yas-gateway-routes-config-configmap
    - name: backoffice-bff-extra-config
      configMap:
        name: backoffice-bff-extra-configmap
  extraVolumeMounts:
    - name: yas-gateway-routes-config
      mountPath: /opt/yas/gateway-routes-config
    - name: backoffice-bff-extra-config
      mountPath: /opt/yas/extra-config
  extraApplicationConfigPaths:
    - /opt/yas/gateway-routes-config/gateway-routes-config.yaml
    - /opt/yas/extra-config/backoffice-bff-extra-config.yaml
  hostAliases:
    - ip: "10.107.36.237"
      hostnames: ["product"]
    - ip: "10.106.118.35"
      hostnames: ["cart"]
    - ip: "10.100.179.89"
      hostnames: ["customer"]
    - ip: "10.100.164.207"
      hostnames: ["inventory"]
    - ip: "10.104.193.183"
      hostnames: ["media"]
    - ip: "10.111.78.114"
      hostnames: ["order"]
    - ip: "10.100.133.185"
      hostnames: ["sampledata"]
    - ip: "10.98.186.243"
      hostnames: ["search"]
    - ip: "10.102.21.177"
      hostnames: ["tax"]
    - ip: "10.100.204.189"
      hostnames: ["keycloak-service", "identity.yas.local.com", "identity.dev.local.com"]
    - ip: "10.97.117.51"
      hostnames: ["keycloak-operator"]
