#Genneral application.yaml for all microservice
applicationConfig:
  server:
    shutdown: graceful
    port: 80
    forward-headers-strategy: framework

  management:
    otlp:
      tracing:
        endpoint: http://opentelemetry-collector.observability:4318/v1/traces
    server:
      port: 8090
    health:
      readinessstate:
        enabled: true
      livenessstate:
        enabled: true
    tracing:
      sampling:
        probability: 1.0
    metrics:
      tags:
        application: ${spring.application.name}
    endpoints:
      web:
        exposure:
          include: prometheus, health
    endpoint:
      health:
        probes:
          enabled: true
        show-details: always

  logging:
    pattern:
      level: application=${spring.application.name} traceId=%X{traceId:-} spanId=%X{spanId:-} level=%level

  spring:
    lifecycle:
      timeout-per-shutdown-phase: 30s
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: http://identity.yas.local.com/realms/Yas

    datasource:
      url:
      username: ${POSTGRESQL_USERNAME}
      password: ${POSTGRESQL_PASSWORD}
    kafka:
      bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
      consumer:
        bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092

  springdoc:
    oauthflow:
      authorization-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
      token-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/token

  yas:
    services:
      cart: http://cart.dev.svc.cluster.local/cart
      customer: http://customer.dev.svc.cluster.local/customer
      inventory: http://inventory.dev.svc.cluster.local/inventory
      location: http://location.dev.svc.cluster.local/location
      media: http://media.dev.svc.cluster.local/media
      order: http://order.dev.svc.cluster.local/order
      payment: http://payment.dev.svc.cluster.local/payment
      payment-paypal: http://payment-paypal.dev.svc.cluster.local/payment-paypal
      product: http://product.dev.svc.cluster.local/product
      promotion: http://promotion.dev.svc.cluster.local/promotion
      rating: http://rating.dev.svc.cluster.local/rating
      search: http://search.dev.svc.cluster.local/search
      tax: http://tax.dev.svc.cluster.local/tax
      sampledata: http://sampledata.dev.svc.cluster.local/sampledata
      recommendation: http://recommendation.dev.svc.cluster.local/recommendation

